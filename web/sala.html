<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Sala — Digital Circus STEM Escape</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Rye&family=Atkinson+Hyperlegible:wght@400;700&display=swap" />
  <link rel="stylesheet" href="css/escenario.css" />
  <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.5.0/model-viewer.min.js"></script>
</head>
<body class="sala">
  <div id="capa-glitch" aria-hidden="true"></div>

  <div id="escena-sala">
    <model-viewer id="visor3d"
      camera-controls
      ar
      shadow-intensity="1"
      exposure="1.05"
      alt="Escena 3D de la sala">
    </model-viewer>
  </div>

  <div id="vineta" aria-hidden="true"></div>
  <div id="capa-ui">
    <div id="hud-flotante" class="visible">
      <div class="panel-hud">
        <span class="hud-etiqueta">Llaves</span>
        <div id="hud-llaves"></div>
      </div>
      <div id="rotulo-sala">
        <span class="personaje" id="nombre-personaje">—</span>
        <span class="materia" id="nombre-materia"></span>
      </div>
      <div class="panel-hud">
        <span class="hud-etiqueta">Abstracción</span>
        <div id="hud-abstraccion" role="progressbar" aria-valuemin="0"
             aria-valuemax="4" aria-valuenow="0" aria-label="Nivel de abstraccion"></div>
      </div>
    </div>
    <div id="zona-inferior">
      <p id="subtitulo-caine" aria-live="polite"></p>
      <p id="indicacion"></p>
      <div class="fila-botones">
        <button id="btn-iniciar" class="boton-carpa">Comenzar</button>
        <button id="btn-responder" class="boton-carpa" hidden>🎤 Responder</button>
      </div>
      <div id="modo-botones" hidden>
        <div class="fila-botones">
          <button id="btn-mano">🖐 Mano abierta</button>
          <button id="btn-pulgar">👍 Pulgar arriba</button>
          <button id="btn-sonrisa">😄 Sonrisa</button>
        </div>
        <input id="respuesta-texto" type="text" placeholder="Escribe tu respuesta y pulsa Enter" />
      </div>
    </div>
  </div>

  <video id="camara" autoplay muted playsinline></video>

  <script>
    document.body.dataset.sala =
      new URLSearchParams(location.search).get("id") || "1";
    const visor = document.getElementById("visor3d");
    setTimeout(() => {
      if (!visor.src) document.body.classList.add("sin-3d");
    }, 2000);
  </script>
  <script type="module" src="js/sala.js"></script>
</body>
</html>
