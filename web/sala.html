<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sala — Digital Circus STEM Escape</title>
  <link rel="stylesheet" href="css/estilos.css" />
  <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.5.0/model-viewer.min.js"></script>
</head>
<body>
  <div id="capa-glitch" aria-hidden="true"></div>

  <h1 id="titulo-sala">Sala</h1>

  <main>
    <div class="hud">
      <div>
        <span class="hud-etiqueta">Llaves</span>
        <div id="hud-llaves"></div>
      </div>
      <div style="flex:1; max-width:240px">
        <span class="hud-etiqueta">Abstracción</span>
        <div id="hud-abstraccion" role="progressbar" aria-valuemin="0" aria-valuemax="4" aria-valuenow="0" aria-label="Nivel de abstracción"></div>
      </div>
    </div>

    <div class="puerta-3d-wrap" id="puerta3dWrap">
      <model-viewer id="visor3d"
        camera-controls
        ar
        shadow-intensity="1"
        alt="Escena 3D de la sala">
      </model-viewer>
      <div class="puerta-panel izq"></div>
      <div class="puerta-panel der"></div>
    </div>
    <div class="piso-damero" aria-hidden="true"></div>

    <p id="subtitulo-caine" aria-live="polite"></p>
    <p id="indicacion"></p>

    <div class="fila-botones">
      <button id="btn-iniciar">🎬 Iniciar reto (activa cámara y micrófono)</button>
      <button id="btn-responder">🎤 Responder</button>
    </div>

    <!-- Respaldo sin cámara: solo para desarrollo y demo de emergencia -->
    <div id="modo-botones" hidden>
      <div class="fila-botones">
        <button id="btn-mano">🖐 Mano abierta</button>
        <button id="btn-pulgar">👍 Pulgar arriba</button>
        <button id="btn-sonrisa">😄 Sonrisa</button>
      </div>
      <input id="respuesta-texto" type="text"
        placeholder="Escribe tu respuesta y presiona Enter" />
    </div>

    <!--
      DIALOGFLOW (plan A, compañero 2): descomentar y poner el agent-id
      cuando el agente esté listo. Mientras, el fallback de Web Speech
      en gestos.js permite probar todo el flujo.

      <script src="https://www.gstatic.com/dialogflow-console/fast/messenger/bootstrap.js?v=1"></script>
      <df-messenger
        chat-title="Caine"
        agent-id="AGENT_ID_AQUI"
        language-code="es"></df-messenger>
    -->
  </main>

  <video id="camara" autoplay muted playsinline></video>

  <script>
    document.body.dataset.sala =
      new URLSearchParams(location.search).get("id") || "1";

    const visor = document.getElementById("visor3d");
    setTimeout(() => {
      if (!visor.src) document.body.classList.add("sin-3d");
    }, 2000);
  </script>
  <script type="module" src="js/sala.js"></script>
</body>
</html>
